<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

</head>
<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- COVER -->
<section id="cover">
  <div class="overlay">
    <h3>The Wedding Of</h3>
    <h1>Riki & Pasangan</h1>
    <p>Kepada Yth:</p>
    <h2 id="guestName">Tamu Undangan</h2>
    <button onclick="openInvitation()">Buka Undangan</button>
  </div>
</section>

<!-- MAIN -->
<section id="main" class="hidden">

<!-- COUPLE -->
<div class="section" data-aos="fade-up">
  <h2>Riki & Pasangan</h2>
  <p>Kami akan menikah</p>
</div>

<!-- EVENT -->
<div class="section" data-aos="fade-up">
  <h2>Akad</h2>
  <p>10 Juni 2026 | 08:00 WIB</p>

  <h2>Resepsi</h2>
  <p>10 Juni 2026 | 10:00 WIB</p>
</div>

<!-- COUNTDOWN -->
<div class="section" data-aos="zoom-in">
  <h2>Menuju Hari Bahagia</h2>
  <div id="countdown"></div>
</div>

<!-- GALLERY -->
<div class="section gallery" data-aos="fade-up">
  <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
</div>

<!-- RSVP -->
<div class="section" data-aos="fade-up">
  <h2>RSVP</h2>
  <input type="text" id="name" placeholder="Nama">
  <select id="status">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
  </select>
  <button onclick="sendRSVP()">Kirim</button>
</div>

<!-- WHATSAPP -->
<div class="section">
  <a id="waBtn" target="_blank">Kirim via WhatsApp</a>
</div>

</section>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="script.js"></script>

</body>
</html>
